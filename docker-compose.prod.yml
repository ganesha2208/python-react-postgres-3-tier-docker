services:
  db:
    image: postgres:16-alpine
    container_name: items-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-itemsdb}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: ${ECR_REGISTRY}/items-backend:${TAG:-v1}
    container_name: items-backend
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-itemsdb}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: ${ECR_REGISTRY}/items-frontend:${TAG:-v1}
    container_name: items-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  db_data:
